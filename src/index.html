        <div><div class="name">HYPERSHELF</div><div class="sub">your HTML file library</div></div>
      </div>
      <div class="btnrow">
        <button class="primary" id="btnNew">＋ New</button>
        <button id="btnUpload">Upload</button>
        <button id="btnPaste">Paste</button>
      </div>
      <div class="side-section">
        <h4>Folders <button class="ghost" id="btnNewFolder" title="New folder">＋</button></h4>
        <div class="navlist" id="folderList"></div>
      </div>
      <div class="side-section">
        <h4>This computer</h4>
        <div class="navlist" id="diskSection"></div>
      </div>
      <div class="side-section">
        <h4>Tags</h4>
        <div class="chips" id="tagChips"></div>
      </div>
      <div class="side-footer">
        <button class="ghost" id="btnWelcome" title="Add a fresh copy of the guided Welcome playground to your shelf">📚 Add example file</button>
        <button class="ghost" id="btnSlides101" title="Add the Slides 101 example deck — a guided tour of slideshow mode">🎞 Add example slideshow</button>
        <button class="ghost" id="btnExportLib">⇩ Export library backup</button>
        <button class="ghost" id="btnImportLib">⇧ Import library backup</button>
        <button class="ghost" id="btnTheme">◐ Light / dark theme</button>
        <button class="ghost" id="btnTour">↺ Replay intro tour</button>
      </div>
    </aside>
    <main class="lib">
      <div class="lib-head">
        <h2 id="libTitle">All files</h2>
        <span class="meta" id="libCount"></span>
        <input type="search" id="searchBox" placeholder="Search files…">
      </div>
      <div id="grid"></div>
    </main>
  </div>

  <!-- ================= EDITOR ================= -->
  <div id="edView">
    <div class="ed-head">
      <button id="btnBack">← Library</button>
      <input type="text" id="edName" title="Rename">
      <span class="ed-sub" id="edSub"></span>
      <button class="ghost" id="btnUndo" title="Undo (Ctrl+Z)">↶</button>
      <button class="ghost" id="btnRedo" title="Redo (Ctrl+Y)">↷</button>
      <div class="ctools">
        <div class="modes" id="mouseModes">
          <button data-mmode="edit" class="active" title="Click any element to edit it">✎ Edit</button>
          <button data-mmode="interact" title="Use the page live — scripts, buttons, and links work">🖱 Interact</button>
        </div>
        <button id="btnCode" title="Side-by-side source code view">‹/› Code</button>
        <span class="tsep"></span>
        <button id="btnInsert" title="Insert a new element (after the selected one)">＋ Insert</button>
        <button id="btnColors" title="See and edit every color and font in this file">🎨 Colors</button>
      </div>
      <button id="btnDownload">Download</button>
      <button id="btnShare" title="Copy a link that carries this whole file inside it — no upload, the recipient gets their own copy">🔗 Share</button>
      <button class="primary" id="btnSave" title="Save — lights up when there are unsaved changes">Save</button>
      <button id="btnMore" title="More tools">⋯</button>
      <div id="moreMenu" class="off">
        <button id="btnAI" title="Round-trip this file through any AI chat">🤖 AI round-trip…</button>
        <button id="btnHistory" title="Snapshots stored on every Save">⌛ Version history…</button>
        <button id="btnPresent" title="Present fullscreen — click/→ next, ‹ › arrows, B blackout, type a number to jump, Esc to exit">▶ Present fullscreen</button>
        <div class="mmrow"><label>Preview width</label>
          <select id="widthSel" title="Preview width">
            <option value="">Full width</option>
            <option value="1024">1024 px</option>
            <option value="768">768 px</option>
            <option value="390">390 px</option>
          </select></div>
      </div>
    </div>
    <div class="ed-body">
      <div id="slideTab" class="off" title="Show the slide filmstrip">🎞</div>
      <div id="slidePanel" class="off">
        <div class="sphead"><span>Slides</span><span class="spbtns">
          <button id="slideDeco" title="Slide numbers &amp; footer">⚙</button>
          <button id="slideAdd" title="Add a slide after the current one — pick a layout">＋ Add</button>
          <button id="slidePresent" title="Present this deck fullscreen">▶</button>
          <button id="slideCollapse" title="Hide the filmstrip">‹</button></span></div>
        <div id="slideList"></div>
      </div>
      <div id="frameWrap"></div>
      <div id="codeResizer" class="off" title="Drag to resize"></div>
      <div id="codePanel" class="off">
        <div id="codeWrap">
          <select id="fileJump" class="off" title="Jump to a bundled file"></select>
          <pre id="codeBack" aria-hidden="true"></pre>
          <textarea id="codeTa" spellcheck="false" wrap="off"></textarea>
        </div>
      </div>
      <aside id="edInspector" class="off"></aside>
      <aside id="themePanel" class="off"></aside>
    </div>
  </div>

  <!-- ================= MODAL / MISC ================= -->
  <div id="modalWrap"><div id="modal"></div></div>
  <div class="toast" id="toast"></div>
  <datalist id="fontList">
    <option value="system-ui, sans-serif"><option value="Georgia, serif">
    <option value="'Times New Roman', serif"><option value="Arial, sans-serif">
    <option value="'Segoe UI', sans-serif"><option value="'Courier New', monospace">
    <option value="Verdana, sans-serif"><option value="'Trebuchet MS', sans-serif">
  </datalist>
  <input type="file" id="fileInput" accept=".html,.htm,.txt" multiple hidden>
  <input type="file" id="libInput" accept=".json" hidden>
  <input type="file" id="imgInput" accept="image/*" hidden>
</div>
<script type="module" src="./main.js"></script>
</body>
</html>
