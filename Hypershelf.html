<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hypershelf</title>
<link rel="icon" type="image/png" id="favicon" href="">
<meta name="theme-color" content="#000000">
<style>
:root{
    --bg:#000000; --panel:#0b0b0d; --panel2:#161619; --border:#26262b;
    --text:#ECEEED; --muted:#8b8f8e; --accent:#54C8FF; --accent2:#2493DC;
    --danger:#ff6b6b; --ok:#4cd97b; --radius:10px;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"Cascadia Code",Consolas,Menlo,monospace;
  }
  *{box-sizing:border-box} html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
  /* greygolus.com signature: faint optical grid + cyan glow behind the content */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;
    background:radial-gradient(circle at 50% 40%,rgba(84,200,255,.05) 0%,transparent 65%),
      linear-gradient(rgba(255,255,255,.014) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.014) 1px,transparent 1px);
    background-size:100% 100%,60px 60px,60px 60px}
  ::selection{background:var(--accent);color:#02131f}
  button{font-family:inherit;font-size:13px;color:var(--text);background:var(--panel2);
    border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer}
  button:hover{border-color:var(--accent);color:#fff}
  button.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#02131f;font-weight:700}
  button.primary:hover{filter:brightness(1.1)}
  button.ghost{background:transparent;border-color:transparent;color:var(--muted)}
  button.ghost:hover{color:var(--text);border-color:var(--border)}
  button.danger{color:var(--danger)}
  input[type=text],input[type=search],input[type=number],select,textarea{
    background:var(--panel2);border:1px solid var(--border);border-radius:8px;
    color:var(--text);padding:6px 10px;font-family:inherit;font-size:13px;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  ::placeholder{color:var(--muted)}
  #app{height:100%;display:flex;flex-direction:column}

  /* ---------- Library view ---------- */
  #libView{flex:1;display:flex;min-height:0}
  aside.sidebar{width:240px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:16px 12px;gap:14px;overflow-y:auto}
  .logo{display:flex;align-items:center;gap:9px;padding:0 4px;user-select:none}
  .logo img.mark{width:30px;height:30px;object-fit:contain;flex-shrink:0;
    filter:drop-shadow(0 0 8px rgba(84,200,255,.45))}
  .logo .name{font-weight:800;font-size:14px;letter-spacing:.18em}
  .logo .sub{font-size:10px;color:var(--muted);margin-top:1px}
  .btnrow{display:flex;gap:6px}
  .btnrow button{flex:1;padding:7px 4px}
  .side-section h4{margin:0 0 6px;font-size:10.5px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.14em;color:var(--muted);
    display:flex;justify-content:space-between;align-items:center;padding:0 4px}
  .side-section h4 button{padding:0 6px;font-size:14px;line-height:1.3}
  .navlist{display:flex;flex-direction:column;gap:2px}
  .navitem{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;color:var(--text)}
  .navitem:hover{background:var(--panel2)}
  .navitem.active{background:var(--panel2);color:#fff;box-shadow:inset 2px 0 0 var(--accent)}
  .navitem .count{margin-left:auto;color:var(--muted);font-size:11px}
  .navitem .del{display:none;margin-left:4px;color:var(--muted);background:none;border:none;padding:0 2px;cursor:pointer}
  .navitem:hover .del{display:inline}
  .navitem .del:hover{color:var(--danger)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 4px}
  .chip{font-size:11px;padding:3px 9px;border-radius:99px;border:1px solid var(--border);
    color:var(--muted);cursor:pointer;background:var(--panel2)}
  .chip:hover{color:var(--text);border-color:var(--accent)}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#02131f}
  .side-footer{margin-top:auto;display:flex;flex-direction:column;gap:6px}
  .side-footer button{text-align:left;font-size:12px}

  main.lib{flex:1;display:flex;flex-direction:column;min-width:0}
  .lib-head{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid var(--border)}
  .lib-head h2{margin:0;font-size:16px;font-weight:600}
  .lib-head .meta{color:var(--muted);font-size:12px}
  .lib-head input[type=search]{margin-left:auto;width:260px}
  #grid{flex:1;overflow-y:auto;padding:20px;display:grid;gap:16px;align-content:start;
    grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    overflow:hidden;cursor:pointer;display:flex;flex-direction:column;transition:border-color .15s, transform .15s}
  .card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 0 24px rgba(84,200,255,.1)}
  .thumb{position:relative;height:140px;background:#fff;overflow:hidden;flex-shrink:0}
  .thumb iframe{width:400%;height:400%;transform:scale(.25);transform-origin:0 0;border:0;pointer-events:none;background:#fff}
  .thumb .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#bbb;font-size:24px;background:repeating-linear-gradient(45deg,#f4f4f6,#f4f4f6 12px,#ececef 12px,#ececef 24px)}
  .card-info{padding:10px 12px;display:flex;flex-direction:column;gap:4px}
  .card-info .row1{display:flex;align-items:center;gap:6px}
  .card-info .fname{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .card-info .fmeta{color:var(--muted);font-size:11px;display:flex;gap:8px;flex-wrap:wrap}
  .tagpill{font-size:10px;padding:1px 7px;border-radius:99px;background:var(--panel2);border:1px solid var(--border);color:var(--muted)}
  .menu-btn{background:none;border:none;color:var(--muted);padding:2px 6px;border-radius:6px;font-size:16px;line-height:1}
  .menu-btn:hover{color:#fff;background:var(--panel2)}
  .dropdown{position:fixed;z-index:100;background:var(--panel2);border:1px solid var(--border);
    border-radius:10px;padding:5px;min-width:160px;box-shadow:0 10px 30px rgba(0,0,0,.5);display:flex;flex-direction:column}
  .dropdown button{background:none;border:none;text-align:left;padding:7px 10px;border-radius:7px;font-size:13px}
  .dropdown button:hover{background:var(--panel)}
  .empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:80px 20px}
  .empty .big{font-size:40px;margin-bottom:10px}
  #grid.dragover{outline:2px dashed var(--accent);outline-offset:-10px;border-radius:14px}

  /* ---------- Editor view ---------- */
  #edView{flex:1;display:none;flex-direction:column;min-height:0}
  #edView.show{display:flex}
  .ed-head{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--panel)}
  .ed-head #edName{font-weight:600;font-size:14px;width:280px;background:transparent;border-color:transparent}
  .ed-head #edName:hover,.ed-head #edName:focus{background:var(--panel2);border-color:var(--border)}
  .ctools{display:flex;align-items:center;gap:8px;margin:0 auto}
  .modes{display:flex;background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px}
  .modes button{border:none;background:none;padding:5px 16px;border-radius:6px;color:var(--muted)}
  .modes button:hover{color:var(--text)}
  .modes button.active{background:var(--accent);color:#02131f;font-weight:700}
  .dirty-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:none}
  .dirty-dot.show{display:block}
  .ed-body{flex:1;min-height:0;display:flex}
  .off{display:none!important}
  #frameWrap{flex:1;min-width:0;display:flex;justify-content:center;background:var(--bg)}
  #frameWrap iframe{flex:1;border:0;width:100%;height:100%;background:#fff}
  #frameWrap iframe.fitw{flex:none;max-width:100%;box-shadow:0 0 0 1px var(--border)}
  #edInspector{width:290px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);
    overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
  #edInspector .hint{color:var(--muted);font-size:12.5px;line-height:1.5}
  .insp-tag{font-family:var(--mono);font-size:12px;color:var(--accent);background:var(--panel2);
    border:1px solid var(--border);border-radius:7px;padding:6px 9px;word-break:break-all}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
  .field textarea{resize:vertical;min-height:64px;font-size:13px;line-height:1.45}
  .colorrow{display:flex;gap:8px;align-items:center}
  .colorrow input[type=color]{width:38px;height:30px;padding:2px;border:1px solid var(--border);
    border-radius:7px;background:var(--panel2);cursor:pointer}
  .colorrow .val{font-family:var(--mono);font-size:11px;color:var(--muted);flex:1}
  .colorrow button{padding:3px 8px;font-size:11px}
  .sizerow{display:flex;gap:6px}
  .sizerow input{width:80px}
  .sizerow select{width:70px}
  .insp-actions{display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--border);padding-top:12px}
  #codePanel{width:42%;min-width:240px;max-width:80vw;border-left:1px solid var(--border);display:flex}
  #codeWrap{position:relative;flex:1;background:#060608}
  #codeBack,#codeTa{position:absolute;inset:0;margin:0;border:0;padding:14px;
    font-family:var(--mono);font-size:12.5px;line-height:1.55;white-space:pre;tab-size:2;overflow:auto;border-radius:0}
  #codeBack{color:transparent;pointer-events:none;overflow:hidden;background:transparent;z-index:0}
  #codeBack .hl{background:rgba(84,200,255,.22);box-shadow:0 0 0 1px rgba(84,200,255,.45);border-radius:3px}
  #codeTa{background:transparent;color:#dbe2f0;resize:none;outline:none;z-index:1}
  #fileJump{position:absolute;top:8px;right:16px;z-index:3;font-size:11px;padding:3px 6px;opacity:.92;max-width:45%}

  /* ---------- Modal ---------- */
  #modalWrap{position:fixed;inset:0;background:rgba(5,7,12,.65);display:none;
    align-items:center;justify-content:center;z-index:200}
  #modalWrap.show{display:flex}
  #modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;
    width:min(640px,92vw);max-height:86vh;display:flex;flex-direction:column;padding:20px;gap:14px}
  #modal h3{margin:0;font-size:15px}
  #modal textarea{min-height:260px;font-family:var(--mono);font-size:12px;resize:vertical}
  #modal .mrow{display:flex;gap:10px;align-items:center}
  #modal .mrow label{color:var(--muted);font-size:12px;width:60px}
  #modal .mrow input,#modal .mrow select{flex:1}
  #modal .mbtns{display:flex;justify-content:flex-end;gap:8px}

  /* gradient editor (inspector Background) */
  .gprev{height:46px;border-radius:8px;border:1px solid var(--border);margin-bottom:16px;
    position:relative;cursor:grab}
  .gprev:active{cursor:grabbing}
  .gmark{position:absolute;bottom:-8px;width:15px;height:15px;border-radius:50%;
    border:2px solid #fff;box-shadow:0 0 0 1.5px rgba(0,0,0,.6),0 1px 4px rgba(0,0,0,.4);
    transform:translateX(-50%);cursor:ew-resize}
  .gmark:hover{width:17px;height:17px;bottom:-9px}
  .gstop{margin-bottom:5px}
  .gstop .gdel{padding:2px 7px}
  .gstop .gdel[disabled]{opacity:.35;cursor:default}
  .gctl{margin-top:6px;display:flex;gap:6px}
  .gctl button{flex:1;font-size:11.5px;padding:4px 6px}
  .gctl input[type=number]{width:50%}

  /* slide filmstrip (decks only) */
  #btnSlides.off{display:none}
  #slidePanel{width:196px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;min-height:0}
  #slidePanel.off{display:none}
  #slidePanel .sphead{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 6px;
    font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  #slidePanel .sphead button{padding:2px 10px;font-size:12px}
  #slideList{flex:1;overflow-y:auto;padding:4px 12px 14px;display:flex;flex-direction:column;gap:10px}
  .sthumb{position:relative;cursor:pointer;flex-shrink:0}
  .sthumb .twrap{width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:8px;
    border:1px solid var(--border);background:#fff;pointer-events:none}
  .sthumb .twrap iframe{width:1280px;height:720px;border:0;transform:scale(.1344);transform-origin:0 0}
  .sthumb:hover .twrap{border-color:var(--muted)}
  .sthumb.active .twrap{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent)}
  .sthumb .snum{position:absolute;left:6px;top:6px;background:rgba(0,0,0,.6);color:#fff;
    font-size:10px;padding:1px 6px;border-radius:99px;pointer-events:none}
  .sthumb .sops{position:absolute;right:4px;top:4px;display:none;gap:3px}
  .sthumb:hover .sops{display:flex}
  .sthumb .sops button{padding:1px 7px;font-size:11px;background:rgba(0,0,0,.68);color:#fff;
    border:1px solid rgba(255,255,255,.28);border-radius:6px;line-height:1.5}
  .sthumb .sops button:hover{background:var(--accent);color:#02131f;border-color:var(--accent)}

  /* incoming share-link preview */
  .shprev{border:1px solid var(--border);border-radius:10px;overflow:hidden;height:280px;background:#fff;flex-shrink:0}
  .shprev iframe{width:100%;height:100%;border:0;display:block}

  .fmeta .subname{color:var(--muted);font-style:italic}
  .ed-sub{color:var(--muted);font-size:11px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tagbox{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:var(--panel2);
    border:1px solid var(--border);border-radius:8px;min-height:44px;align-items:center}
  .tagbox input{border:none!important;background:none!important;flex:1;min-width:110px;padding:4px!important}
  .tchip{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 8px 3px 10px;
    border-radius:99px;background:var(--accent);color:#02131f;font-weight:600}
  .tchip button{background:none;border:none;color:#02131f;padding:0;cursor:pointer;font-size:11px;opacity:.8}
  .tchip button:hover{opacity:1}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--panel2);
    border:1px solid var(--border);border-radius:10px;padding:9px 18px;font-size:13px;z-index:300;
    box-shadow:0 8px 30px rgba(0,0,0,.5);opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}

  button:disabled{opacity:.45;pointer-events:none}
  .crumbs{font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.7;word-break:break-all}
  .crumbs .crumb{color:var(--accent);cursor:pointer}
  .crumbs .crumb:hover{text-decoration:underline}
  .crumbs .crumb.cur{color:var(--text);cursor:default;text-decoration:none}
  .vlist{display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto;flex-shrink:0}
  .vrow{display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--panel2);
    border:1px solid var(--border);border-radius:8px;font-size:12.5px}
  .vrow .vsize{color:var(--muted);font-size:11px;margin-left:auto}
  .vrow .vcur{font-size:11px;color:var(--ok)}
  .vrow button{padding:3px 10px;font-size:11px}
  #vPane{height:190px;background:#fff;border-radius:8px;overflow:hidden;border:1px solid var(--border);flex-shrink:0}
  #vPane iframe{width:100%;height:100%;border:0}
  #vPane .vhint{display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:12px}
  #vPane.asdiff{height:auto;background:transparent;border:none;overflow:visible}

  /* ---------- diff view / AI round-trip ---------- */
  #modal.wide{width:min(920px,94vw)}
  .dstats{font-size:12px;color:var(--muted)}
  .diffview{font-family:var(--mono);font-size:11.5px;line-height:1.5;background:#060608;
    border:1px solid var(--border);border-radius:8px;overflow:auto;max-height:300px;padding:6px 0}
  .diffview .dl{padding:0 10px;white-space:pre}
  .diffview .dl>span{display:inline-block;width:14px;color:var(--muted);user-select:none}
  .dl.da{background:rgba(76,217,123,.13);color:#7ee29d}
  .dl.dd{background:rgba(255,107,107,.12);color:#ff9a9a}
  .dfold{color:var(--muted);padding:2px 10px;font-style:italic;font-size:11px}
  .prevsplit{display:flex;gap:10px}
  .prevsplit>div{flex:1;min-width:0}
  .prevsplit .plabel{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.7px}
  .prevsplit iframe{width:100%;height:280px;border:1px solid var(--border);border-radius:8px;background:#fff}

  /* ---------- inspector: attributes + spacing ---------- */
  .attrrow{display:flex;gap:4px;margin-bottom:4px}
  .attrrow .an{width:38%;font-family:var(--mono);font-size:11px}
  .attrrow .av{flex:1;font-family:var(--mono);font-size:11px;min-width:0}
  .attrrow button{padding:2px 7px;flex-shrink:0}
  .boxrow{display:flex;gap:4px}
  .boxrow input{width:25%;min-width:0;padding:5px 6px;font-size:12px}
  .boxcap{display:flex;gap:4px;margin-top:2px}
  .boxcap span{width:25%;text-align:center;font-size:9.5px;color:var(--muted)}

  /* ---------- resizable code panel ---------- */
  #codeResizer{width:5px;flex-shrink:0;cursor:col-resize;background:var(--border)}
  #codeResizer:hover{background:var(--accent)}
  body.resizing{user-select:none;cursor:col-resize}
  body.resizing iframe{pointer-events:none}

  /* ---------- first-run tour ---------- */
  #tourHole{position:fixed;z-index:400;border-radius:10px;pointer-events:none;
    box-shadow:0 0 0 9999px rgba(4,6,10,.62);transition:top .25s,left .25s,width .25s,height .25s}
  #tourCard{position:fixed;z-index:401;background:var(--panel);border:1px solid var(--border);
    border-radius:12px;padding:16px 18px;width:300px;box-shadow:0 12px 40px rgba(0,0,0,.5)}
  #tourCard h4{margin:0 0 6px;font-size:14px}
  #tourCard p{margin:0 0 12px;font-size:12.5px;color:var(--muted);line-height:1.5}
  #tourCard .tbtns{display:flex;justify-content:space-between;align-items:center}
  #tourCard .tstep{font-size:11px;color:var(--muted)}

  /* ---------- light theme ---------- */
  body.light{--bg:#ECEEED;--panel:#f9fafa;--panel2:#e2e5e4;--border:#cfd4d2;
    --text:#0b0d0d;--muted:#616362;--accent:#0e87cc;--accent2:#0a5f96}
  body.light::before{background:radial-gradient(circle at 50% 40%,rgba(14,135,204,.05) 0%,transparent 65%),
    linear-gradient(rgba(0,0,0,.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,0,0,.022) 1px,transparent 1px);
    background-size:100% 100%,60px 60px,60px 60px}
  body.light ::selection{background:var(--accent);color:#fff}
  body.light button.primary{color:#fff}
  body.light .chip.active{color:#fff}
  body.light .modes button.active{color:#fff}
  body.light .tchip,body.light .tchip button{color:#fff}
  body.light .logo img.mark{filter:drop-shadow(0 0 8px rgba(14,135,204,.5))}
  body.light .card:hover{box-shadow:0 0 24px rgba(14,135,204,.14)}
  body.light button:hover{color:var(--text)}
  body.light .navitem.active{color:var(--text)}
  body.light .menu-btn:hover{color:var(--text)}
  body.light #codeWrap{background:#f4f6fa}
  body.light #codeTa{color:#232838}
  body.light .diffview{background:#f4f6fa}
  body.light .dl.da{color:#177a3d}
  body.light .dl.dd{color:#b53535}

  /* ---------- file theme panel (🎨 Colors) ---------- */
  #themePanel{width:290px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);
    overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
  .tswl{display:flex;flex-direction:column;gap:6px}
  .tsw{display:flex;flex-direction:column;padding:5px 7px;background:var(--panel2);
    border:1px solid var(--border);border-radius:8px}
  .tswh{display:flex;align-items:center;gap:9px;cursor:pointer}
  .tswh .texp{margin-left:auto;padding:0 6px;font-size:11px;flex-shrink:0}
  .tpicker{display:flex;flex-direction:column;gap:9px;padding:10px 2px 4px}
  .tpicker input[type=range]{-webkit-appearance:none;appearance:none;height:14px;border-radius:7px;
    border:1px solid rgba(0,0,0,.35);outline:none;padding:0;width:100%;cursor:pointer}
  .tpicker input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;
    border-radius:50%;background:#fff;border:2px solid #333;box-shadow:0 1px 4px rgba(0,0,0,.5);cursor:pointer}
  .tphexrow{display:flex;gap:8px;align-items:center}
  .tpprev{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);flex-shrink:0}
  .tphex{flex:1;min-width:0;font-family:var(--mono);font-size:12px}
  .throw{display:flex;gap:6px}
  .throw button{flex:1;font-size:12px;padding:5px 4px}
  .tsw input[type=color]{width:34px;height:28px;padding:2px;border:1px solid var(--border);
    border-radius:6px;background:var(--panel2);cursor:pointer;flex-shrink:0}
  .tswi{display:flex;flex-direction:column;min-width:0}
  .thex{font-family:var(--mono);font-size:11.5px}
  .tuse{font-size:10.5px;color:var(--muted)}
  .tfont{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .tfont input{flex:1;min-width:0;font-size:12px}
  .tfont .fpick{flex-shrink:0;padding:4px 9px}

  /* ---------- inspector sections + advanced controls ---------- */
  details.isec{border:1px solid var(--border);border-radius:9px;background:var(--panel2)}
  details.isec summary{cursor:pointer;padding:7px 10px;font-size:10.5px;font-family:var(--mono);
    text-transform:uppercase;letter-spacing:.1em;color:var(--muted);user-select:none;list-style:none;
    display:flex;justify-content:space-between;align-items:center}
  details.isec summary::-webkit-details-marker{display:none}
  details.isec summary::after{content:'▾';font-size:10px}
  details.isec[open] summary::after{content:'▴'}
  details.isec .ibody{padding:2px 10px 12px;display:flex;flex-direction:column;gap:10px}
  details.isec .ibody input,details.isec .ibody select{background:var(--panel)}
  .fontrow{display:flex;gap:6px}
  .fontrow input{flex:1;min-width:0}
  .fontrow button{flex-shrink:0;padding:4px 9px}
  input[type=range]{accent-color:var(--accent);width:100%;padding:0}

  /* ---------- ＋ Insert palette ---------- */
  #insertMenu{position:fixed;z-index:400;background:var(--panel);border:1px solid var(--border);border-radius:12px;
    box-shadow:0 14px 44px rgba(0,0,0,.55);width:220px;padding:5px;display:flex;flex-direction:column}
  #insertMenu button{display:flex;align-items:center;gap:10px;background:none;border:none;
    text-align:left;padding:8px 10px;border-radius:8px;font-size:13px}
  #insertMenu button:hover{background:var(--panel2)}
  #insertMenu .iic{width:20px;text-align:center}
  #insertMenu .ihint{font-size:10.5px;color:var(--muted);padding:7px 10px 5px;border-top:1px solid var(--border);margin-top:4px}

  /* ---------- template gallery ---------- */
  .tplgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .tpl{display:flex;flex-direction:column;align-items:flex-start;gap:3px;text-align:left;
    background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
  .tpl:hover{border-color:var(--accent)}
  .tpl .tplic{font-size:22px}
  .tpl b{font-size:13.5px}
  .tpl .tpld{font-size:11.5px;color:var(--muted);line-height:1.4}

  /* ---------- presenter mode ---------- */
  #presentOv{position:fixed;inset:0;z-index:600;background:#000}
  #presentOv iframe{width:100%;height:100%;border:0}

  /* ---------- built-in font stack picker ---------- */
  #fontMenu{position:fixed;z-index:400;background:var(--panel);border:1px solid var(--border);border-radius:12px;
    box-shadow:0 14px 44px rgba(0,0,0,.55);max-height:340px;overflow-y:auto;width:300px;padding:5px;
    display:flex;flex-direction:column}
  #fontMenu button{display:flex;flex-direction:column;align-items:flex-start;gap:1px;background:none;border:none;
    text-align:left;padding:7px 10px;border-radius:8px}
  #fontMenu button:hover{background:var(--panel2)}
  #fontMenu .fmName{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  #fontMenu .fmSample{font-size:15.5px;color:var(--text)}
</style>
</head>

<script>
(() => {
  // src/utils.js
  var $ = (s) => document.querySelector(s);
  var $$ = (s) => [...document.querySelectorAll(s)];
  var uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  var esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
  var debounce = (fn, ms) => {
    let t;
    return (...a) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...a), ms);
    };
  };
  var fmtDate = (ts) => new Date(ts).toLocaleDateString(void 0, { month: "short", day: "numeric", year: "numeric" });
  var toastT;
  function toast(msg) {
    const t = $("#toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastT);
    toastT = setTimeout(() => t.classList.remove("show"), 2200);
  }
  function rgbToHex(rgb) {
    const m = rgb && rgb.match(/[\d.]+/g);
    if (!m) return "#000000";
    if (m.length > 3 && parseFloat(m[3]) === 0) return null;
    return "#" + m.slice(0, 3).map((n) => Math.round(+n).toString(16).padStart(2, "0")).join("");
  }

  // src/db.js
  var db;
  function openDB() {
    return new Promise((res, rej) => {
      const r = indexedDB.open("hypershelf", 4);
      r.onupgradeneeded = (e) => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains("files")) d.createObjectStore("files", { keyPath: "id" });
        if (!d.objectStoreNames.contains("folders")) d.createObjectStore("folders", { keyPath: "name" });
        if (!d.objectStoreNames.contains("handles")) d.createObjectStore("handles", { keyPath: "id" });
        if (!d.objectStoreNames.contains("versions")) d.createObjectStore("versions", { keyPath: "vid" });
        if (!d.objectStoreNames.contains("drafts")) d.createObjectStore("drafts", { keyPath: "fileId" });
      };
      r.onsuccess = (e) => {
        db = e.target.result;
        res();
      };
      r.onerror = () => rej(r.error);
    });
  }
  var idb = {
    all: (s) => new Promise((res, rej) => {
      const q = db.transaction(s).objectStore(s).getAll();
      q.onsuccess = () => res(q.result);
      q.onerror = () => rej(q.error);
    }),
    get: (s, k) => new Promise((res, rej) => {
      const q = db.transaction(s).objectStore(s).get(k);
      q.onsuccess = () => res(q.result);
      q.onerror = () => rej(q.error);
    }),
    put: (s, v) => new Promise((res, rej) => {
      const q = db.transaction(s, "readwrite").objectStore(s).put(v);
      q.onsuccess = () => res();
      q.onerror = () => rej(q.error);
    }),
    del: (s, k) => new Promise((res, rej) => {
      const q = db.transaction(s, "readwrite").objectStore(s).delete(k);
      q.onsuccess = () => res();
      q.onerror = () => rej(q.error);
    })
  };

  // src/state.js
  var state = {
    files: [],
    folders: [],
    filter: { folder: null, tag: null, q: "", disk: false },
    disks: [],
    /* [{id,handle,name,files:[],needsPerm}] — connected real folders */
    cur: null,

  function visibleFiles() {
    const { folder, tag, q } = state.filter, ql = q.toLowerCase();
    return state.files.filter((f) => (folder === null || f.folder === folder) && (tag === null || (f.tags || []).includes(tag)) && (!q || f.name.toLowerCase().includes(ql) || (f.displayName || "").toLowerCase().includes(ql))).sort((a, b) => b.modified - a.modified);
  }
  function renderSidebar() {
    const fl = $("#folderList");
    const items = [
      { name: null, label: "All files", count: state.files.length },
      ...state.folders.map((fo) => ({
        name: fo.name,
        label: fo.name,
        count: state.files.filter((f) => f.folder === fo.name).length
      }))
    ];
    fl.innerHTML = items.map((it) => `
    <div class="navitem${!state.filter.disk && state.filter.folder === it.name ? " active" : ""}" data-folder="${it.name === null ? "" : esc(it.name)}" data-all="${it.name === null}">
      <span>${it.name === null ? "🗂" : "📁"}</span><span>${esc(it.label)}</span>
      ${it.name !== null ? `<button class="del" title="Delete folder">✕</button>` : ""}
      <span class="count">${it.count}</span>
    </div>`).join("");
    fl.querySelectorAll(".navitem").forEach((el) => {
      el.onclick = (e) => {
        if (e.target.classList.contains("del")) {
          deleteFolder(el.dataset.folder);
          return;
        }
        state.filter.folder = el.dataset.all === "true" ? null : el.dataset.folder;
        state.filter.disk = false;
        renderLibrary();
      };
    });
    renderDiskSection();
    const tags = [...new Set(state.files.flatMap((f) => f.tags || []))].sort();
    $("#tagChips").innerHTML = tags.length ? tags.map((t) => `<span class="chip${state.filter.tag === t ? " active" : ""}" data-tag="${esc(t)}">${esc(t)}</span>`).join("") : '<span style="color:var(--muted);font-size:12px">No tags yet</span>';
    $("#tagChips").querySelectorAll(".chip").forEach((ch) => ch.onclick = () => {
      state.filter.tag = state.filter.tag === ch.dataset.tag ? null : ch.dataset.tag;
      state.filter.disk = false;
      renderLibrary();
    });
  }
  var thumbObserver;
  function renderGrid() {
    if (state.filter.disk) {
      renderDiskGrid();

    $("#libTitle").textContent = state.filter.folder ?? "All files";
    $("#libCount").textContent = files.length + (files.length === 1 ? " file" : " files") + (state.filter.tag ? ` · tag: ${state.filter.tag}` : "");
    if (!files.length) {
      grid2.innerHTML = `<div class="empty"><div class="big">📄</div>
      ${state.files.length ? "Nothing matches this filter." : `Your shelf is empty.<br>Click <b>＋ New</b>, <b>Upload</b>, or just drag &amp; drop .html files here.<br>

         <span style="font-size:12px">A guided page that walks you through every editor feature.</span>`}</div>`;
      if ($("#btnWelcome2")) $("#btnWelcome2").onclick = addWelcomeFile;
      return;
    }
    grid2.innerHTML = files.map((f) => `
    <div class="card" data-id="${f.id}">
      <div class="thumb"><div class="ph">‹/›</div></div>
      <div class="card-info">
        <div class="row1"><span class="fname" title="${esc(f.name)}">${esc(f.displayName || f.name)}</span>
          <button class="menu-btn" title="Actions">⋮</button></div>
        <div class="fmeta">${f.displayName ? `<span class="subname">${esc(f.name)}</span>` : ""}<span>${fmtDate(f.modified)}</span>
          ${f.folder ? `<span>📁 ${esc(f.folder)}</span>` : ""}</div>
        ${(f.tags || []).length ? `<div class="fmeta">${f.tags.map((t) => `<span class="tagpill">${esc(t)}</span>`).join("")}</div>` : ""}
      </div>
    </div>`).join("");
    if (thumbObserver) thumbObserver.disconnect();
    thumbObserver = new IntersectionObserver((entries) => {
      for (const en of entries) {
        if (!en.isIntersecting) continue;
        thumbObserver.unobserve(en.target);
        const f = state.files.find((x) => x.id === en.target.dataset.id);
        if (!f) continue;
        const ifr = document.createElement("iframe");
        ifr.setAttribute("sandbox", "");
        ifr.loading = "lazy";
        ifr.srcdoc = f.html;
        const th = en.target.querySelector(".thumb");

    grid2.querySelectorAll(".card").forEach((card) => {
      thumbObserver.observe(card);
      card.onclick = (e) => {
        if (e.target.classList.contains("menu-btn")) {

  function tagDialog(f) {
    let tags = [...f.tags || []];
    const all = [...new Set(state.files.flatMap((x) => x.tags || []))].sort();
    showModal(`<h3>Tags — ${esc(f.displayName || f.name)}</h3>

    <div class="chips" id="tagSugg"></div>
    <div class="mbtns"><button id="mCancel">Cancel</button><button class="primary" id="mOk">Save</button></div>`);
    function add(v) {
      v = v.trim().replace(/,+$/, "");
      if (v && !tags.includes(v)) tags.push(v);
      draw();

    function draw() {
      $("#tagBox").innerHTML = tags.map((t) => `<span class="tchip">${esc(t)}<button data-t="${esc(t)}" title="Remove">✕</button></span>`).join("") + `<input type="text" id="tagIn" placeholder="${tags.length ? "add…" : "type a tag, press Enter"}">`;
      $("#tagBox").querySelectorAll(".tchip button").forEach((b) => b.onclick = () => {

      const inp = $("#tagIn");

          draw();

    idb,
    hist,
    histGo,
    histPush,
    verKey,
    pushVersion,
    renderFrame,
    syncNow,
    setDirty,
    saveCur,
    flushSerialize,
    selectDisplayEl,
    saveDraft,
    setCodeHighlight,
    refreshCodeText,
    insertHtmlAfterSelection,
    listDisk,
    bundleDiskHtml,
    preloadDiskAssets,
    applyAssetCache,
    saveDiskProject,
    resolveRel,
    createExampleSite,
    openDiskFile,
    activeDisk,
    renderLibrary,
    diffLines,
    renderDiffHTML,
    extractHtml,
    scanTheme,
    applyColorSwap,
    renderThemePanel,
    closeThemePanel,
    startTour,
    makeShareLink,
    shareFile,
    checkShareHash,
    isSlideshow,
    addSlide,
    addSlideAfterSelection,
    dupSlide,
    delSlide,

    focusSlide,
    refreshSlidesUI,
    parseGradient,

    get themeHist() {

    }
  };
  (async function init() {
    $("#favicon").href = $(".logo img.mark").src;
    if (location.hostname.endsWith(".vercel.app")) {
      const va = document.createElement("script");
      va.defer = true;
      va.src = "/_vercel/insights/script.js";
      document.head.appendChild(va);
    }
    await openDB();
    state.files = await idb.all("files");
    state.folders = await idb.all("folders");
    try {
      for (const rec of await idb.all("handles")) {
        if (!rec.handle) continue;
        const d = { id: rec.id, handle: rec.handle, name: rec.handle.name, files: [], needsPerm: false };
        state.disks.push(d);
        try {
          const p = await rec.handle.queryPermission({ mode: "readwrite" });
          if (p === "granted") await listDisk(d);
          else d.needsPerm = true;
        } catch {
          d.needsPerm = true;
        }
      }
    } catch {
    }
    if (!state.files.length && !localStorage.getItem("hs-welcomed")) {
      localStorage.setItem("hs-welcomed", "1");
      await addFile("Welcome to Hypershelf.html", WELCOME, { tags: ["guide"] });
    }
    renderLibrary();
    checkShareHash();
    if (!localStorage.getItem("hs-toured")) setTimeout(startTour, 500);
  })();
})();
